<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UNDERlate</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="UNDERlate game">
        <canvas id="game" width="640" height="480"></canvas>
      </section>
      <aside class="keys" aria-label="Controls">
        <span>Move: Arrow Keys / WASD</span>
        <span>Menu: Arrow Keys</span>
        <span>Confirm: Z / Enter / Click</span>
        <span>Cancel: X / Escape</span>
        <span>Journal: Shift</span>
        <span>Save: F5</span>
        <span>Load: F9</span>
      </aside>
    </main>
    <script src="content.js"></script>
    <script src="game.js"></script>
  </body>
</html>
